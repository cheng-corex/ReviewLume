name: P9 Typecheck Debug

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          echo "$code" > typecheck.exit
          exit 0
      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: p9-typecheck-log
          path: |
            typecheck.log
            typecheck.exit
