name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
          - os: macos-latest
            node-version: 22

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: pnpm typecheck > typecheck.log 2>&1

      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: typecheck.log
          if-no-files-found: error

      - name: Fail after typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Test
        run: pnpm test

      - name: Validate browser extension
        run: pnpm validate:browser-extension

      - name: Build
        run: pnpm build

      - name: Package VSIX
        run: pnpm package:vscode

      - name: Upload VSIX candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewlume-vscode-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: reviewlume-vscode-*.vsix
          if-no-files-found: error

      - name: Validate VSIX contents
        run: pnpm --filter reviewlume-vscode verify:package-contents
