name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee test-output-${{ matrix.node-version }}.txt

      - name: Upload failing test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reviewlume-test-output-${{ matrix.node-version }}
          path: test-output-${{ matrix.node-version }}.txt
          if-no-files-found: error

      - name: Build
        run: pnpm build

      - name: Package VSIX
        run: pnpm package:vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewlume-vscode-${{ matrix.node-version }}
          path: reviewlume-vscode-*.vsix
          if-no-files-found: error
