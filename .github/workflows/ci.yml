name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
          - os: macos-latest
            node-version: 22

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee test-output.log

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: test-output.log
          if-no-files-found: error

      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        shell: bash
        run: |
          echo '=== test-output.log ==='
          cat test-output.log || true
          exit 1

      - name: Validate browser extension
        run: pnpm validate:browser-extension

      - name: Build
        run: pnpm build

      - name: Package VSIX
        run: pnpm package:vscode

      - name: Upload VSIX candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewlume-vscode-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: reviewlume-vscode-*.vsix
          if-no-files-found: error

      - name: Validate VSIX contents
        run: pnpm --filter reviewlume-vscode verify:package-contents
