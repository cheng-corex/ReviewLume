<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ReviewLume Bridge</title>
  <style>
    body { font: 13px system-ui; width: 320px; margin: 16px; }
    label { display: block; margin: 10px 0 4px; }
    input, select, button { box-sizing: border-box; width: 100%; padding: 8px; }
    button { margin-top: 10px; }
    #status { min-height: 32px; white-space: pre-wrap; }
    .secondary { background: transparent; }
    details { margin-top: 12px; }
  </style>
</head>
<body>
  <strong>ReviewLume Browser Bridge</strong>
  <p>推荐从 VS Code 状态栏选择“Connect &amp; Open …”一键连接。</p>
  <details>
    <summary>手动恢复配对</summary>
    <label for="baseUrl">本地桥接地址</label>
    <input id="baseUrl" placeholder="http://127.0.0.1:12345">
    <label for="pairingCode">一次性配对码</label>
    <input id="pairingCode" maxlength="8" autocomplete="off">
    <label for="targetSite">目标站点</label>
    <select id="targetSite">
      <option value="chatgpt.com">ChatGPT</option>
      <option value="claude.ai">Claude</option>
      <option value="gemini.google.com">Gemini</option>
    </select>
    <button id="pair">配对并授权此站点</button>
  </details>
  <button id="poll" class="secondary">检查待填入提示</button>
  <button id="fill">填入当前页面（不会发送）</button>
  <button id="revoke" class="secondary">撤销配对</button>
  <p id="status" role="status"></p>
  <script type="module" src="popup.js"></script>
</body>
</html>
